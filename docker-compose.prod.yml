services:
  app:
    build: .
    ports:
      - "3010:3010"
    environment:
      DATABASE_URL: postgres://shortener:${DB_PASSWORD:-shortener}@10.116.0.2:6432/shortener
      REDIS_URL: redis://10.116.0.2:6379
      BASE_URL: ${BASE_URL:-http://localhost:3010}
      NODE_ENV: production
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:4100}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 150m
